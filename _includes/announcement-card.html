<article class="h-full rounded-2xl border border-soft/40 bg-white p-6 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-xl">
  <time class="inline-flex items-center gap-2 text-sm font-bold text-primary" datetime="{{ include.announcement.iso_date }}"><i class="fa-regular fa-calendar text-accent"></i>{{ include.announcement.date }}</time>
  <h3 class="mt-4 font-heading text-xl font-bold text-primary">{{ include.announcement.title }}</h3>
  <p class="mt-3 text-sm leading-7 text-textGray">{{ include.announcement.description }}</p>
  <a class="mt-5 inline-flex items-center text-sm font-bold text-primary transition hover:text-secondary" href="{{ '/announcements/' | relative_url }}#{{ include.announcement.slug }}">Read More <i class="fa-solid fa-arrow-right ml-2 text-xs"></i></a>
</article>
