<article class="group flex h-full flex-col rounded-2xl border border-soft/40 bg-white p-6 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-xl">
  <div class="mb-5 grid h-14 w-14 place-items-center rounded-2xl bg-soft/20 text-2xl text-primary transition group-hover:bg-primary group-hover:text-white" aria-hidden="true">
    <i class="{{ include.course.icon }}"></i>
  </div>
  <h3 class="font-heading text-xl font-bold text-primary">{{ include.course.title }}</h3>
  <p class="mt-3 flex-1 text-sm leading-7 text-textGray">{{ include.course.description }}</p>
  <a class="mt-5 inline-flex items-center justify-center rounded-full border border-primary px-5 py-2.5 text-sm font-semibold text-primary transition hover:bg-primary hover:text-white" href="{{ include.course.url | relative_url }}">View Course <i class="fa-solid fa-arrow-right ml-2 text-xs"></i></a>
</article>
