<article class="group flex h-full flex-col rounded-2xl bg-white p-6 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-xl">
  <div class="mb-5 grid h-14 w-14 place-items-center rounded-2xl bg-brand-soft text-2xl text-brand-orange transition group-hover:bg-brand-orange group-hover:text-white" aria-hidden="true">
    <i class="{{ include.course.icon }}"></i>
  </div>
  <h3 class="font-heading text-xl font-bold text-brand-dark">{{ include.course.title }}</h3>
  <p class="mt-3 flex-1 text-sm leading-7 text-brand-muted">{{ include.course.description }}</p>
  <a class="mt-5 inline-flex items-center justify-center rounded-full border border-orange-200 px-5 py-2.5 text-sm font-semibold text-brand-orange transition hover:border-brand-orange hover:bg-brand-soft" href="{{ include.course.url | relative_url }}">View Course <i class="fa-solid fa-arrow-right ml-2 text-xs"></i></a>
</article>
