<article class="course-card card-lift">
  <div class="course-card__icon" aria-hidden="true">{{ include.course.icon }}</div>
  <h3>{{ include.course.title }}</h3>
  <p>{{ include.course.description }}</p>
  <a class="btn btn--small btn--outline" href="{{ include.course.url | relative_url }}">View Course</a>
</article>
