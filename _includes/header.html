<header class="sticky top-0 left-0 right-0 z-[1000] w-full bg-white shadow-sm relative">
  <div class="mx-auto w-full max-w-7xl px-4 py-2 sm:px-6 md:py-3 lg:px-8">
    <div class="flex h-auto min-h-[60px] items-center justify-between gap-4">
      <a class="flex items-center gap-3" href="{{ '/' | relative_url }}" aria-label="Inspiration Classes home">
        <img class="h-10 w-10 rounded-full bg-white object-contain p-0.5 shadow-md ring-2 ring-slate-100 md:h-12 md:w-12" src="{{ '/assets/img/logo.webp' | relative_url }}" alt="Inspiration Classes logo">
        <span class="leading-tight">
          <strong class="block font-heading text-lg font-extrabold text-primary md:text-xl">Inspiration Classes</strong>
          <small class="flex items-center gap-1 text-xs font-medium text-slate-600 md:text-sm"><i class="fa-solid fa-location-dot text-accent"></i> Bareilly's Premier Coaching</small>
        </span>
      </a>

      <div class="hidden items-center gap-3 lg:flex">
        <a href="{{ '/registration/' | relative_url }}" class="rounded-xl border-2 border-primary px-5 py-3 font-bold text-primary transition hover:bg-primary hover:text-white">Register</a>
        <a href="{{ '/enrollment/' | relative_url }}" class="rounded-xl bg-accent px-5 py-3 font-bold text-textDark shadow-md transition hover:bg-accentLight">Enroll Now</a>
        <button id="menuToggleDesktop" class="inline-flex items-center gap-2 rounded-xl border border-primary px-4 py-3 font-bold text-primary transition hover:bg-primary hover:text-white" type="button" aria-label="Toggle menu" aria-controls="navMenuDesktop" aria-expanded="false">
          <i class="fa-solid fa-bars"></i>
          <span>Menu</span>
        </button>
      </div>

      <button id="menuToggleMobile" class="inline-flex items-center justify-center rounded-xl border border-primary px-4 py-3 text-primary transition hover:bg-primary hover:text-white lg:hidden" type="button" aria-label="Toggle menu">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
  </div>

  <div id="navMenuDesktop" class="hidden absolute top-full left-0 w-full z-[999] bg-white border-t border-slate-200 shadow-2xl">
    <div class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-xl font-extrabold text-primary">Menu</h3>
        <button id="menuCloseDesktop" class="w-11 h-11 rounded-full bg-bgLight text-primary flex items-center justify-center hover:bg-primary hover:text-white transition" type="button" aria-label="Close menu">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <a href="{{ '/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">Home</a>
        <a href="{{ '/about/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">About</a>
        <a href="{{ '/courses/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">Courses</a>
        <a href="{{ '/announcements/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">Announcements</a>
        <a href="{{ '/blog/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">Blog</a>
        <a href="{{ '/gallery/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">Gallery</a>
        <a href="{{ '/founder/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">Founder</a>
        <a href="{{ '/contact/' | relative_url }}" class="menu-link p-4 rounded-2xl bg-bgLight text-textDark font-semibold hover:bg-primary hover:text-white transition">Contact</a>
      </div>
    </div>
  </div>

  <div id="navMenuMobile" class="hidden fixed inset-0 z-[999] bg-white lg:hidden">
    <div class="flex flex-col min-h-screen max-h-screen overflow-y-auto">
      <div class="flex items-center justify-between p-4 border-b border-gray-100">
        <h3 class="text-xl font-extrabold text-primary">Menu</h3>
        <button id="menuCloseMobile" class="flex h-10 w-10 items-center justify-center rounded-full bg-bgLight text-primary transition hover:bg-primary hover:text-white" type="button" aria-label="Close menu">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <nav class="grid grid-cols-1 gap-4 p-4 sm:grid-cols-2" aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">Home</a>
        <a href="{{ '/about/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">About</a>
        <a href="{{ '/courses/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">Courses</a>
        <a href="{{ '/announcements/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">Announcements</a>
        <a href="{{ '/blog/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">Blog</a>
        <a href="{{ '/gallery/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">Gallery</a>
        <a href="{{ '/founder/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">Founder</a>
        <a href="{{ '/contact/' | relative_url }}" class="mobile-menu-link rounded-2xl bg-bgLight p-4 font-semibold text-textDark transition hover:bg-primary hover:text-white">Contact</a>
      </nav>
      <div class="mt-6 grid grid-cols-1 gap-3 p-4">
        <a href="{{ '/registration/' | relative_url }}" class="mobile-menu-link flex w-full items-center justify-center rounded-2xl border-2 border-[#173A8A] px-5 py-4 text-center font-bold text-[#173A8A] transition hover:bg-[#173A8A] hover:text-white">Register</a>
        <a href="{{ '/enrollment/' | relative_url }}" class="mobile-menu-link flex w-full items-center justify-center rounded-2xl bg-[#FFC400] px-5 py-4 text-center font-bold text-[#0F172A] shadow-md transition hover:bg-[#FFD84D]">Enroll Now</a>
      </div>
      <div class="mt-auto p-4 pb-[env(safe-area-inset-bottom)]"></div>
    </div>
  </div>
</header>
