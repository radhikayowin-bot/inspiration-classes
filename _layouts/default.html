<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="Inspiration Classes">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:image" content="{{ page.image | default: site.image }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://placehold.co">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Poppins', 'sans-serif']
            },
            colors: {
              primary: '#173A8A',
              primaryBlue: '#173A8A',
              deepBlue: '#102E73',
              secondary: '#2856D9',
              brightBlue: '#2856D9',
              softBlue: '#3E63B8',
              accent: '#FFC400',
              accentLight: '#FFD84D',
              white: '#FFFFFF',
              bgLight: '#F5F7FB',
              textDark: '#0F172A',
              textGray: '#64748B',
              borderSoft: 'rgba(255,255,255,0.25)',
              soft: '#D8E2F3'
            },
            boxShadow: {
              soft: '0 12px 30px rgba(15, 23, 42, 0.08)',
              premium: '0 18px 40px rgba(15, 23, 42, 0.14)',
              glow: '0 20px 60px rgba(40, 86, 217, 0.24)'
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' }
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              float: 'float 4s ease-in-out infinite'
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      html, body {
        overflow-x: hidden;
        width: 100%;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .highlight-video-card {
        background: #000;
      }

      .highlight-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .sound-toggle {
        width: 44px;
        height: 44px;
        min-width: 44px;
        min-height: 44px;
        max-width: 44px;
        max-height: 44px;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1;
        flex-shrink: 0;
        overflow: hidden;
      }

      .sound-toggle i {
        font-size: 14px;
        line-height: 1;
      }

      html.menu-open,
      body.menu-open {
        overflow: hidden;
        height: 100%;
        touch-action: none;
      }

      #navMenu {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      .faculty-image-wrapper {
        width: 100%;
        height: 420px;
        min-height: 420px;
        max-height: 420px;
      }

      .faculty-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
        display: block;
      }

      @media (max-width: 1024px) {
        .faculty-image-wrapper {
          height: 390px;
          min-height: 390px;
          max-height: 390px;
        }
      }

      @media (max-width: 768px) {
        .faculty-image-wrapper {
          height: 360px;
          min-height: 360px;
          max-height: 360px;
        }
      }

      @media (max-width: 480px) {
        .faculty-image-wrapper {
          height: 340px;
          min-height: 340px;
          max-height: 340px;
        }
      }

      .faculty-card {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .faculty-image-wrapper {
        border-top-left-radius: 28px;
        border-top-right-radius: 28px;
        overflow: hidden;
      }

      .faculty-image {
        transition: transform 0.7s ease-in-out;
      }

      .faculty-card:hover .faculty-image {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body class="bg-bgLight font-sans text-textDark antialiased">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W8ZW67CS"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <a class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded-lg focus:bg-primary focus:px-4 focus:py-3 focus:text-white" href="#main">Skip to content</a>
    {% include header.html %}
    <main id="main">
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  </body>
</html>
